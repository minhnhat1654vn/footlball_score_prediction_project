{% extends "base.html" %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .auth-box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
    }
    .auth-box h2 {
        text-align: center;
        color: #1e3c72;
        margin-bottom: 10px;
        font-weight: 700;
    }
    .auth-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 0.9rem;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
        transition: border-color 0.3s;
        box-sizing: border-box;
    }
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }
    .password-requirements {
        font-size: 0.85rem;
        color: #666;
        margin-top: 5px;
        padding: 8px;
        background: #f5f5f5;
        border-radius: 4px;
        border-left: 3px solid #667eea;
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s;
        margin-top: 10px;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .auth-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }
    .auth-link p {
        color: #666;
        margin: 0;
    }
    .auth-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }
    .auth-link a:hover {
        color: #764ba2;
    }
    .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
    }
    body.darkmode .auth-box {
        background: #23272b !important;
        color: #e0e0e0 !important;
    }
    body.darkmode .auth-box h2 {
        color: #f7b731 !important;
    }
    body.darkmode .auth-subtitle {
        color: #aaa !important;
    }
    body.darkmode .form-group label {
        color: #e0e0e0 !important;
    }
    body.darkmode .form-group input {
        background: #181a1b !important;
        color: #e0e0e0 !important;
        border-color: #444 !important;
    }
    body.darkmode .form-group input:focus {
        border-color: #667eea !important;
    }
    body.darkmode .password-requirements {
        background: #181a1b !important;
        color: #aaa !important;
        border-left-color: #667eea !important;
    }
    body.darkmode .auth-link {
        border-top-color: #444 !important;
    }
    body.darkmode .auth-link p {
        color: #aaa !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Đăng Ký</h2>
        <p class="auth-subtitle">Tạo tài khoản để quản lý đội yêu thích</p>

        {% if error %}
        <div class="alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">Tên người dùng</label>
                <input type="text" id="username" name="username" required
                       value="{{ username or '' }}" autofocus>
                <div class="password-requirements">Min. 6 ký tự, không dấu cách</div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       value="{{ email or '' }}">
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required>
                <div class="password-requirements">Min. 6 ký tự</div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn-submit">Đăng Ký</button>
        </form>

        <div class="auth-link">
            <p>Đã có tài khoản? <a href="{{ url_for('auth.login') }}">Đăng nhập</a></p>
        </div>
    </div>
</div>
{% endblock %}
